<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="data:,">
    <title>Ro Sham Bo</title>
    <script>
      let data = {"hand" : ["rock", "paper", "scissors"]};
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <h1>Welcome to Ro Sham Bo!</h1>
    <button onclick="start()" class="btn btn-default">New Game</button>
    <hr>
    <h2>Pick One!</h2>
    <div class="form-group">
      <button id="Rock" onclick="shoot(this.id)" class="btn btn-default">Rock</button>
      <button id="Paper" onclick="shoot(this.id)" class="btn btn-default">Paper</button>
      <button id="Scissors" onclick="shoot(this.id)" class="btn btn-default">Scissors</button>
    </div>
    <hr>
    <div class="jumbotron">
      <div id="output">
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script>
      function start(){
        document.getElementById("output").innerHTML = "New Game! <br>";
      }
      function shoot(hand){
        document.getElementById("output").innerHTML += `You choose ${hand} <br>`;
        return;
      }
    </script>
  </body>
</html>
